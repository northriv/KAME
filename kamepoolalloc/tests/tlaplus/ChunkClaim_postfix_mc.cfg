\* Post-fix: back_offset written only AFTER the claim CAS wins.
\* Same hardcoded topology as the pre-fix cfg.  TLC is EXPECTED TO PASS
\* — INV2 (BackoffConsistent) holds because a CAS loser never writes
\* back_offset for units the winner owns.
SPECIFICATION Spec

CONSTANT Speculative = FALSE

INVARIANT TypeOK
INVARIANT NoOverlap
INVARIANT BackoffConsistent
INVARIANT LookupResolvesOwner
