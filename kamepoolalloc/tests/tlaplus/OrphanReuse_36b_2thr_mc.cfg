\* OrphanReuse_36b — 2-thread, K=2 model check.
\*
\* 2 competitors is the minimum that can reproduce the documented race:
\*   - t1 pops the chunk (PoP0/PoP1/PoP2)
\*   - t2 cross-thread frees a survivor while t1 is mid-re-own
\* K=2 lets a push-then-pop-then-push interleave hit either slot.
\* AllowReown=TRUE lets the post-PoP1 allocator hand out a fresh slot
\* before the original survivor's dec lands.

SPECIFICATION Spec

\* Terminal RELEASED state has no enabled actions — that's the SUCCESS
\* terminus, not a stuck-progress error.  TLC's default deadlock check
\* would flag it, so disable; safety invariants below are what matter.
CHECK_DEADLOCK FALSE

CONSTANTS
    Threads = {t1, t2}
    K = 2
    AllowReown = TRUE

INVARIANTS
    TypeOK
    Inv_NoBadRelease
    Inv_DispCoherentOnQuiet
    Inv_ReleasedSticky
