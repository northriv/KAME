\* No-leak liveness under fairness.  Expect Liveness HOLDS.
SPECIFICATION SpecLive
CHECK_DEADLOCK FALSE
CONSTANTS
    N1 = n1
    N2 = n2
    N3 = n3
    NIL = nil
    AllowReown = TRUE
    AllowLiveRemoval = FALSE
    MaxGen = 1
    MaxPush = 3
PROPERTY Liveness
INVARIANTS
    TypeOK
    Inv_NoBadRelease
    Inv_NonEmptyHasRef
