\* Wrap-stress configuration: per-thread counter set to the smallest
\* width (MaxLocalEpoch = 1).  Each thread's counter immediately wraps
\* back to 1, so the SAME <<tid, 1>> epoch value is re-used across
\* successive allocations by that thread -- the wrap-induced ABA the
\* design's identity check must catch as foreign (NOT as a stale read).
\* Expected: TLC may either find an Inv_NoStaleRead VIOLATION (the
\* width is insufficient) or NO error (the design is robust even at
\* width=1 because identity is also disambiguated via the chunk's
\* base unit, not just the epoch value).

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    NumUnits = 2
    MaxLocalEpoch = 1
    AllowWrap = TRUE
    SinglePayout = FALSE
    Null = Null

INVARIANT Inv_NoStaleRead
INVARIANT Inv_LiveSlotConsistent
INVARIANT Inv_BackOffInRange
