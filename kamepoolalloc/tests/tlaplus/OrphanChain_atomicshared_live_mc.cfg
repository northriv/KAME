\* OrphanChain_atomicshared — liveness (NO LEAK) under fairness.
\*
\* With weak fairness on the reclaim actions (HeadAdvance / SweepRelink /
\* Release), every chunk that stays empty forever is eventually released:
\* empty-eager + sweep compaction strands no permanently-empty orphan.
\* Expect: Liveness holds (and the safety invariants too).

SPECIFICATION SpecLive
CHECK_DEADLOCK FALSE

CONSTANTS
    N1 = n1
    N2 = n2
    N3 = n3
    NIL = nil
    SelfRef = TRUE
    AllowReown = TRUE
    MaxGen = 1
    MaxPush = 0

PROPERTY
    Liveness

INVARIANTS
    TypeOK
    Inv_NoBadRelease
    Inv_LiveNeverReleased
