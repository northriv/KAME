\* The PROPOSED FIX: a re-owned chunk carries an owner-ref (local_shared_ptr in
\* the DLL); the owner DROPS it rather than calling deallocate_chunk, so every
\* free is refcnt-mediated.  SAFETY set — Inv_OwnedNotChained is intentionally
\* omitted: a pin'd predecessor can transiently point at an owned node in BOTH
\* designs, so "owned => not chained" is simply not an invariant.  Its CONSEQUENCE
\* (free-while-referenced) is the real hazard, captured by Inv_NoBadOwnerFree +
\* Inv_ReleasedNoRefs + Inv_NoDanglingNext — all expected CLEAN here.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE
CONSTANTS
    N1 = n1
    N2 = n2
    N3 = n3
    NIL = nil
    GateOnOwned = TRUE
    OwnerRef = TRUE
    MaxGen = 2
INVARIANTS
    TypeOK
    Inv_NoBadRelease
    Inv_NoBadOwnerFree
    Inv_ReleasedNoRefs
    Inv_NoDanglingNext
    Inv_Acyclic
