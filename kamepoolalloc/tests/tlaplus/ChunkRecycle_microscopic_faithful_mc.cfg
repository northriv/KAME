\* NEGATIVE CONTROL — faithful model.
\* D_Start keeps the slot live (bit set) until the lookup completes in
\* D_Resolve, matching the real cross-free / drain ordering where the
\* bitmap bit is cleared only AFTER lookup_chunk has resolved the chunk.
\* Under this ordering the chunk cannot be reclaimed mid-lookup, so a
\* single well-behaved deallocate must be safe: TLC should find
\* NO error.  Confirming this pins the bug upstream (early bit-clear /
\* double-payout), not in lookup_chunk on a lone deallocate.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    NumUnits = 2
    MaxGen = 3
    FreeBeforeLookup = FALSE
    SinglePayout = FALSE
    Null = Null

INVARIANT Inv_NoStaleRead
INVARIANT Inv_LiveSlotImpliesClaimed
INVARIANT Inv_BackOffPointsToBase
