\* Adopt model — the SHIPPED design (raw DLL, no owner-ref).  Two safety props:
\*   Inv_NoBadRelease   — smart_ptr disposal gated on BIT_OWNED (CLEAN).
\*   Inv_NoBadOwnerFree — owner's direct deallocate_chunk vs residual pin
\*                        (VIOLATION — the finding; owner-free ignores refcnt).
SPECIFICATION Spec
CHECK_DEADLOCK FALSE
CONSTANTS
    N1 = n1
    N2 = n2
    N3 = n3
    NIL = nil
    GateOnOwned = TRUE
    OwnerRef = FALSE
    MaxGen = 2
INVARIANTS
    TypeOK
    Inv_NoBadRelease
    Inv_NoBadOwnerFree
