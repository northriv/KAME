\* BundleUnbundle 2-level superfine: high-fidelity C++ failure handling
\* 2 threads, MaxCommits=1 for smoke; superfine adds:
\*   #1 Pre-bundle serial CAS (BundleCollect)
\*   #4 Phase3 serial/parent check → DISTURBED
\*   #6 Phase1 retry same child on parent unchanged
SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxPayload = 3
    MaxSerial = 1024
    MaxCommits = 1
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"

SYMMETRY ThreadSymmetry

CONSTRAINT SerialBound

INVARIANT Safety
INVARIANT TerminalPayloadCheck
