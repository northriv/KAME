\* 1-thread minimal repro: bundle(GN1) with P2 hardlinked external to P1.
\* Even though Phase 3 skip-Null is applied, GN1's is_bundle_root
\* override publishes GN1 ~missing while GN2.sub[P2]=Null is
\* unreachable within GN1.  Expected: SnapshotConsistency violation.
SPECIFICATION Spec

CONSTANTS
    Threads = {1}
    GN1 = GN1
    GN2 = GN2
    P2 = P2
    P1 = P1
    Null = Null

INVARIANT SnapshotConsistency
INVARIANT BundleRefConsistency
INVARIANT DebugRetryBound

PROPERTY EventuallyAllDone
