\* 3-thread 2L superfine, Config C: all root — LIVENESS variant.
\* All threads = CommitParent only (no CommitChild).
\* PROPERTY EventuallyAllDone enabled: full liveness check after state exhaustion.
\*
\* Known state space (safety-only run): 137,333,348 states, depth 96, 6h 35min.
\* Estimated wall time with liveness: 12–20h on F1cpu with RAM disk.
\* Use: sbatch ohtaka/run_l2llf_3thr_superfine_live.sh
\*      (CFG defaults to this file)

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2, 3}
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxCommits = 1
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"
    RootThreads = {1, 2, 3}
    LeafThreads = {}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleRefConsistency
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound
INVARIANT PrintTerminalMaxCounter

PROPERTY EventuallyAllDone
