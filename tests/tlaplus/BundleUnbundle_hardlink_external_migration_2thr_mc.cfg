\* 2-thread cross-tree migration with peer P1Race
SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    GN1 = GN1
    GN2 = GN2
    P2 = P2
    P1 = P1
    Null = Null

INVARIANT SnapshotConsistency
INVARIANT HardlinkExclusive
INVARIANT BundleRefConsistency
INVARIANT DebugRetryBound

\* DebugRetryBound used as INVARIANT (not CONSTRAINT) — see comment
\* in the .tla file.  CONSTRAINT silently prunes long-retry paths
\* and risks false-negative liveness verdicts.  As INVARIANT, TLC
\* reports a violation if any execution exceeds the bound, which is
\* exactly what we want to detect.
