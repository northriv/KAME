\* Coarse 3-level LLfree: smallest state space sanity check.
\* All 4 atomicity knobs = "coarse" → entire bulk operation in one
\* atomic action. Useful for fast PASS/FAIL verification before
\* committing to larger superfine runs.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxCommits = 1
    UnbundleWalkAtomic  = "coarse"
    UnbundleCASAtomic   = "coarse"
    BundleCollectAtomic = "coarse"
    BundlePhase3Atomic  = "coarse"
    Privilege = TRUE
    RootThreads = {1, 2}
    LeafThreads = {1, 2}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT PrintTerminalSerial
INVARIANT DebugSerialBound

PROPERTY EventuallyAllDone
