\* Address-level lookup_chunk vs reclaim+recycle race hunt.
\* 2 threads, 2 units (so a 2-unit chunk can recycle into a 1-unit one,
\* reinterpreting the continuation unit), 2 generations.

SPECIFICATION Spec

\* PERMISSIVE model: D_Start frees the slot immediately, so the chunk
\* is reclaimable mid-lookup.  Exposes lookup_chunk's missing
