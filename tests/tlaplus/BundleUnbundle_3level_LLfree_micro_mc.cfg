\* Micro config for the 3-level LL-free spec.
\*
\* Tree:    Grand -> Parent -> {Child1, Child2}
\* Threads: {1, 2}
\* MaxCommits: 1
\* No CONSTRAINT SerialBound; finite state space comes from priorityTag.
\* No SYMMETRY (TagOlder needs Nat-ordered Threads, and SYMMETRY can mask
\* liveness violations).
\*
\* Expected state space: 3-5x of 2-level micro fine (~2-5M).

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxSerial = 128
    MaxCommits = 1
    UnbundleWalkAtomic  = "superfine"
    UnbundleCASAtomic   = "superfine"
    BundleCollectAtomic = "fine"
    BundlePhase3Atomic  = "fine"
    Privilege = TRUE

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT PrintTerminalSerial
INVARIANT DebugSerialBound

PROPERTY EventuallyAllDone
