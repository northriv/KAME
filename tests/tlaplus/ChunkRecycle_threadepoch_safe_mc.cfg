\* Safe-width configuration: per-thread counter wide enough that no
\* thread wraps in this bounded exploration.  Under the proposed
\* per-AllocSlot epoch + unit-meta pair-atomic design, lookup_chunk
\* should never accept a stale chunk -- TLC must find NO ERROR even
\* with SinglePayout=FALSE.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    NumUnits = 2
    MaxLocalEpoch = 5
    AllowWrap = FALSE
    SinglePayout = FALSE
    Null = Null

INVARIANT Inv_NoStaleRead
INVARIANT Inv_LiveSlotConsistent
INVARIANT Inv_BackOffInRange
