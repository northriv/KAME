\* NEGATIVE control: AllowLiveRemoval=TRUE lets the sweeper drop a non-empty
\* node -> it loses its last ref -> released while filled>0.  Expect VIOLATION.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE
CONSTANTS
    N1 = n1
    N2 = n2
    N3 = n3
    NIL = nil
    AllowReown = TRUE
    AllowLiveRemoval = TRUE
    MaxGen = 1
    MaxPush = 3
INVARIANTS
    TypeOK
    Inv_NoBadRelease
