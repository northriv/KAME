\* 3-thread dynamic 2L superfine, Config B: insert + 2 root.
\* Thread 1 = InsertOnly. Thread 2,3 = CommitParent only. No LeafThreads.
\* Tests insert-vs-root CAS contention; no direct CommitChild.
\* ohtaka target: INVARIANT only.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2, 3}
    Parent = Parent
    DynChild1 = DynChild1
    DynChild2 = DynChild2
    Null = Null
    MaxCommits = 1
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"
    InsertThreads  = {1}
    RootThreads    = {2, 3}
    LeafThreads    = {}
    ReleaseThreads = {}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleRefConsistency
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound
INVARIANT PrintTerminalMaxCounter
