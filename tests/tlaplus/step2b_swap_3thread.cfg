\* Step 2b: load_shared_ + swap + ABA recycling, 3 threads
\* 3 threads, 2 objects
\*
\* C++ pattern tested:
\*   // Thread 1: load          // Thread 2: swap           // Thread 3: swap
\*   {                          {                            {
\*     auto p                     local_shared_ptr<Ref> lp;    local_shared_ptr<Ref> lp;
\*       = a.load_shared_();     lp.swap(a);                  lp.swap(a);
\*   }                          }                            }
\*   // + ABA: allocator may recycle freed objects (same pointer value)
\*
\* swap is simpler than CAS: no PreInc, no CASCheck, no CASCleanup.
\* The local hold becomes the installed ref and vice versa.
\*
\* Note: 3 threads + swap + ABA is too large for local verification.
\*   Kept for ISSP ohtaka. Use atomic_shared_ptr_mc.cfg (2 threads) for
\*   local full verification including swap.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2, t3}
    Objects = {o1, o2}
    EnableCAS = FALSE
    EnableSwap = TRUE
    EnableRecycle = TRUE
    NULL = NULL

SYMMETRY ObjectSymmetry

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
    LocalRCBounded
