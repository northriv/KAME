\* 3-thread 2L coarse, Config C: all root.
\* All threads = CommitParent only (no CommitChild).
\* Tests 3-way contention on Parent CAS + bundle collect.
\* Unbundle/direct-commit path not exercised.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2, 3}
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxCommits = 1
    BundleCollectAtomic = "coarse"
    BundlePhase3Atomic  = "coarse"
    RootThreads = {1, 2, 3}
    LeafThreads = {}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleRefConsistency
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound
INVARIANT PrintTerminalMaxCounter
