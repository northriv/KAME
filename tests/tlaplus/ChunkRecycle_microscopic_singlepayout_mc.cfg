\* NEGATIVE CONTROL #2 — no double-payout.
\* SinglePayout forbids two threads being mid-deallocate of the same
\* unit (a slot is never handed to two threads at once).  Faithful
\* lookup ordering too.  Under these assumptions the address-level
\* lookup_chunk + reclaim + recycle must be safe: TLC should find
\* NO error.  This pins the first-order cause of the alloc_stress
\* corruption to an upstream DOUBLE-PAYOUT (two threads given the same
\* slot) — the claim/recycle CAS handover or FS=false N-bit decoding —
\* with lookup_chunk's missing generation check as the amplifier that
\* turns it into the observed out-of-range (bit-state -3) crash.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    NumUnits = 2
    MaxGen = 3
    FreeBeforeLookup = FALSE
    SinglePayout = TRUE
    Null = Null

INVARIANT Inv_NoStaleRead
INVARIANT Inv_LiveSlotImpliesClaimed
INVARIANT Inv_BackOffPointsToBase
