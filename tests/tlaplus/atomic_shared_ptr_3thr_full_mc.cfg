\* atomic_shared_ptr: 3-thread full operations.
\* 3 threads, 2 objects, MaxOps = 2, load + CAS + swap + scope.
\* Larger than 3thr_cas (adds swap); requires ohtaka.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2, t3}
    Objects = {o1, o2}
    MaxOps = 2
    EnableCAS = TRUE
    EnableSwap = TRUE
    NULL = NULL

SYMMETRY AllSymmetry

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
    LocalRCBounded
    QuiescentCheck
    TerminalCheck
    ScopeConsistent
