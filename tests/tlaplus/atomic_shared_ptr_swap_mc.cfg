\* atomic_shared_ptr verification: swap + load + ABA recycling
\* 2 threads, 2 objects, symmetry reduction
\*
\* C++ pattern tested (all interleavings):
\*   atomic_shared_ptr<Ref> a(initial_obj);
\*
\*   // Thread 1                     // Thread 2
\*   for(;;) {                       for(;;) {
\*     auto p = a.load_shared_();      local_shared_ptr lp(newval);
\*     // use *p                       lp.swap(a);
\*   }                               }

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Objects = {o1, o2}
    EnableCAS = FALSE
    EnableSwap = TRUE
    EnableRecycle = TRUE
    NULL = NULL

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
    LocalRCBounded
    QuiescentCheck
