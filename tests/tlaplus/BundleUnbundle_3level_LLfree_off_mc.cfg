\* Privilege=FALSE sanity cfg.
\* Disables LL-free tag gating to compare semantics against the old
\* BundleUnbundle.tla (no privilege mode). Use sparingly and with small
\* configs — without LL-free, retry loops have no upper bound and TLC
\* state space grows unboundedly. Run with SAFETY-only invariants
\* (no PROPERTY EventuallyAllDone, no DebugSerialBound).
\*
\* Recommended use: small MaxCommits + large CONSTRAINT SerialBound
\* clamp to make TLC terminate, accepting that result is a sanity
\* check (not a formal proof).

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxCommits = 1
    UnbundleWalkAtomic  = "fine"
    UnbundleCASAtomic   = "fine"
    BundleCollectAtomic = "fine"
    BundlePhase3Atomic  = "fine"
    Privilege = FALSE
    RootThreads = {1, 2}
    LeafThreads = {1, 2}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
