\* 3-thread 3L (fine+superfine mix), LIVENESS variant.
\* |Threads|=3, MaxCommits=1, BundleCollect=fine, BundlePhase3=fine, UnbundleWalk/CAS=superfine.
\* PROPERTY EventuallyAllDone enabled: full liveness check after state exhaustion.
\*
\* State space: unknown (estimated 50–500M based on 2t 3L fine = 11.8M).
\* Use: CFG=BundleUnbundle_3level_LLfree_3thr_live_mc.cfg sbatch ohtaka/run_l3llf_3thr_superfine_live.sh

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2, 3}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxCommits = 1
    UnbundleWalkAtomic  = "superfine"
    UnbundleCASAtomic   = "superfine"
    BundleCollectAtomic = "fine"
    BundlePhase3Atomic  = "fine"
    Privilege = TRUE

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound
INVARIANT PrintTerminalMaxCounter

PROPERTY EventuallyAllDone
