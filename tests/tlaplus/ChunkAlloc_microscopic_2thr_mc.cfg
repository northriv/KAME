\* Minimal-scope TLC run: 2 threads, 3 bits, 1 op each.
\* Hunts intra-chunk slot double-claim race.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    OwnerThread = 1
    NumWords = 2
    BitsPerWord = 2
    MaxOps = 2
    Null = Null

INVARIANT Inv_NoDoubleClaim
INVARIANT Inv_AtMostOneReclaim
INVARIANT Inv_NoUseAfterReclaim
INVARIANT Inv_FlagsPackedConsistency
INVARIANT Inv_BitmapAccountedFor
