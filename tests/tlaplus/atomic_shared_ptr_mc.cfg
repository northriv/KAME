\* Main model checking configuration for atomic_shared_ptr
\* Full verification: CAS + ABA + non-atomic read
\* 2 threads, 2 objects, max local_rc = 2, max global_rc = 4

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Objects = {o1, o2}
    MaxLocalRC = 2
    MaxGlobalRC = 4
    EnableCAS = TRUE
    EnableRecycle = TRUE
    NULL = NULL

CONSTRAINT StateConstraint

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
