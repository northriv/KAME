\* Main model checking configuration for atomic_shared_ptr
\* Full verification: CAS + ABA recycling
\* 2 threads, 2 objects — verified in ~2 min (25M states)
\*
\* C++ pattern tested (all interleavings):
\*   atomic_shared_ptr<Ref> a(initial_obj);
\*
\*   // Thread 1                              // Thread 2
\*   for(;;) {                                for(;;) {
\*     {                                        {
\*       auto p = a.load_shared_();               auto p = a.load_shared_();
\*       // use *p                                // use *p
\*     }                                        }
\*     {                                        {
\*       auto newval = ...;  // may reuse         auto newval = ...;
\*       auto expected = ...; // freed addr       auto expected = ...;
\*       a.compareAndSwap_(expected, newval);     a.compareAndSwap_(expected, newval);
\*     }                                        }
\*   }
\*
\*   // + ABA: freed objects are recycled by the allocator (same pointer
\*   //   value), testing that the tagged-pointer protocol prevents
\*   //   use-after-free and stale-pointer installation.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Objects = {o1, o2}
    EnableCAS = TRUE
    EnableSwap = FALSE
    EnableRecycle = TRUE
    NULL = NULL

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
    LocalRCBounded
