\* 3-thread dynamic 2L superfine, Config B: insert + 2 root — LIVENESS variant.
\* Thread 1 = InsertOnly. Thread 2,3 = CommitParent only.
\* PROPERTY EventuallyAllDone enabled.
\*
\* State space: unknown.
\* Use: CFG=BundleUnbundle_2level_LLfree_dynamic_3thr_B_live_mc.cfg sbatch ohtaka/run_l2llf_dynamic_live.sh

SPECIFICATION Spec

