\* OrphanChain_atomicshared — SelfRef=FALSE knob (NEGATIVE control).
\*
\* Drops the self-ref, tying chunk lifetime to chain membership alone.
\* Expect Inv_NoBadRelease VIOLATION: a dead predecessor self-resets its
\* `next` (SelfResetNext) before a sweeper relinks, so a LIVE successor's
\* only incoming ref disappears -> StructRefs = 0 -> Release fires with
\* m_filled > 0.  This proves the self-ref on m_filled is load-bearing:
\* without it, "a live node falling off the chain" is NOT safe-side.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    N1 = n1
    N2 = n2
    N3 = n3
    NIL = nil
    SelfRef = FALSE
    AllowReown = TRUE
    MaxGen = 1
    MaxPush = 0

INVARIANTS
    TypeOK
    Inv_NoBadRelease
