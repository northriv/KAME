\* Adopt model — the design.  Tests TWO independent safety properties:
\*   Inv_NoBadRelease   — smart_ptr disposal is gated on BIT_OWNED (CLEAN).
\*   Inv_NoBadOwnerFree — the owner's direct deallocate_chunk never frees a
\*                        chunk a residual smart_ptr still references.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE
CONSTANTS
    N1 = n1
    N2 = n2
    N3 = n3
    NIL = nil
    GateOnOwned = TRUE
    MaxGen = 2
INVARIANTS
    TypeOK
    Inv_NoBadRelease
    Inv_NoBadOwnerFree
