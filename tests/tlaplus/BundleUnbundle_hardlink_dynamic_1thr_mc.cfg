\* 1-thread: minimal sequential exploration.  Thread 1 inserts both
\* parents then commits.  No interleaving — useful as a baseline /
\* sanity check before opening 2-thread races.
SPECIFICATION Spec

CONSTANTS
    Threads = {1}
    Parent1 = Parent1
    Parent2 = Parent2
    DynChild1 = DynChild1
    Null = Null
    MaxCommits = 1
    BundleCollectAtomic  = "superfine"
    BundlePhase3Atomic   = "superfine"
    InsertThreads  = {}
    RootThreads    = {1}
    LeafThreads    = {}
    ReleaseThreads = {}

INVARIANT SnapshotConsistency
INVARIANT HardlinkExclusive
INVARIANT BundleRefConsistency
INVARIANT NoPriorityLoss
INVARIANT MissingPropagation
INVARIANT QuiescentCheck
INVARIANT TerminalPayloadCheck

PROPERTY EventuallyAllDone
