\* NOTE: run with -deadlock flag (terminal states where all budget=0 are not bugs):
\*   java -cp tla2tools.jar tlc2.TLC -deadlock -config BundleUnbundle_mc.cfg BundleUnbundle.tla
SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxPayload = 3
    MaxSerial = 128
    MaxCommits = 5
    \* Atomicity granularity for 4 bulk-operation sites.
    \* "coarse" = single atomic action (matches recursive-operator semantics)
    \* "fine"   = one load/CAS per action (models real C++ interleaving)
    UnbundleWalkAtomic   = "coarse"
    UnbundleCASAtomic    = "fine"
    BundleCollectAtomic  = "coarse"
    BundlePhase3Atomic   = "fine"

SYMMETRY ThreadSymmetry

INVARIANT Safety
INVARIANT TerminalPayloadCheck
