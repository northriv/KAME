\* Step 3: 3 threads + CAS + ABA + non-atomic read + symmetry reduction
\* 3 threads, 2 objects, max local_rc = 2, max global_rc = 3

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2, t3}
    Objects = {o1, o2}
    MaxLocalRC = 2
    MaxGlobalRC = 5
    EnableCAS = TRUE
    EnableRecycle = TRUE
    NULL = NULL

SYMMETRY ObjectSymmetry

CONSTRAINT StateConstraint

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
