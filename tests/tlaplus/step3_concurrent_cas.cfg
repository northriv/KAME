\* Step 3: 3 threads + CAS + ABA + symmetry reduction
\* 3 threads, 2 objects
\*
\* C++ pattern tested:
\*   // Thread 1: load        // Thread 2: CAS           // Thread 3: CAS
\*   {                        {                           {
\*     auto p                   auto nv = ...;              auto nv = ...;
\*       = a.load_shared_();   auto ex = ...;              auto ex = ...;
\*     // use *p                a.compareAndSwap_(ex,nv);   a.compareAndSwap_(ex,nv);
\*   }                        }                           }
\*   // + ABA: allocator may return the same pointer value for a freed object
\*   //   (Recycle), testing whether tagged-pointer CAS prevents ABA.
\*
\* Note: state space is too large for practical verification (~120M+
\*   distinct states at depth 36, queue still growing).  The 2-thread
\*   configurations (step1, step2, atomic_shared_ptr_mc) provide full
\*   coverage; this file is kept for reference only.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2, t3}
    Objects = {o1, o2}
    EnableCAS = TRUE
    EnableSwap = FALSE
    EnableRecycle = TRUE
    NULL = NULL

SYMMETRY ObjectSymmetry

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
    LocalRCBounded
