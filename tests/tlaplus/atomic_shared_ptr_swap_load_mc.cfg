\* Layer 0: swap(+reset) vs load_shared(+reset)
\* 2 threads, 2 objects, no CAS, no ABA recycling
\* Tests the critical tag-to-global transfer path when a swapper
\* replaces the pointer while a loader has an in-flight acquire_tag_ref.
\*
\* Init is asymmetric (firstThread holds otherObj for swap), so no SYMMETRY.
\* State space should be tractable — estimated millions, not billions.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Objects = {obj_A, obj_B}
    NULL = NULL
    EnableCAS = FALSE
    EnableSwap = TRUE
    EnableRecycle = FALSE

\* No SYMMETRY — Init assigns firstThread/initObj/otherObj asymmetrically

INVARIANT TypeOK
INVARIANT MemorySafety
INVARIANT NoUseAfterFree
INVARIANT GlobalRCNonNeg
INVARIANT FreedImpliesZeroRC
INVARIANT InstalledNotFreed
INVARIANT LocalRCBounded
INVARIANT QuiescentCheck

CHECK_DEADLOCK FALSE
