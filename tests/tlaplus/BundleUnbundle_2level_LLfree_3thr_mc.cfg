\* 3-thread LL-free fine, MaxCommits=1.
\* Tests LL-free liveness under thread-count scaling.
\* Estimated state space: 50-200M (depends heavily on contention patterns).
\* Target: ohtaka i8cpu within 30min.
\*
\* Threads must be naturals (TagOlder needs ordering).
\* SYMMETRY removed for liveness checking.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2, 3}
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxCommits = 1
    BundleCollectAtomic = "fine"
    BundlePhase3Atomic  = "fine"

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleRefConsistency
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound

PROPERTY EventuallyAllDone
