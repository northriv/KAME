\* OrphanChain_atomicshared — SelfRef=TRUE (the converged design).
\*
\* The self-ref on m_filled decouples chunk lifetime from chain membership,
\* so every structural race among concurrent sweepers (lost update,
\* tail-loss, a live node falling off the chain, a dead node surviving a
\* round) is SAFE-SIDE.  Expect CLEAN: no bad_release, no UAF, acyclic.

SPECIFICATION Spec

\* The all-released terminus has no enabled actions — that is SUCCESS, not
\* stuck progress; disable TLC's deadlock check.  Safety invariants are
\* what matter.
CHECK_DEADLOCK FALSE

CONSTANTS
    N1 = n1
    N2 = n2
    N3 = n3
    NIL = nil
    SelfRef = TRUE
    AllowReown = TRUE
    MaxGen = 1
    MaxPush = 0

INVARIANTS
    TypeOK
    Inv_NoBadRelease
    Inv_LiveNeverReleased
    Inv_NoDanglingNext
    Inv_HeadAlive
    Inv_ReleasedNoIncoming
    Inv_Acyclic
