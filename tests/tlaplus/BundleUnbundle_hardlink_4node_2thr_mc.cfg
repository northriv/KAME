\* 2-thread: T1 bundles Root, T2 releases C from A or B.
\* Expected: SnapshotConsistency violated under specific interleavings.
SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    Root = Root
    A = A
    B = B
    C = C
    Null = Null

INVARIANT SnapshotConsistency
INVARIANT HardlinkExclusive

\* DebugRetryBound used as CONSTRAINT (state-space bound, NOT a safety
\* invariant).  With DISTURBED-style retry semantics, T1's bundle can
\* retry unboundedly under unfair scheduling.  Liveness is verified
\* separately via SF(MigrateCToA) + EventuallyAllDone — that pair
\* proves the system always reaches AllDone under fair scheduling.
\* The CONSTRAINT keeps TLC's state space finite.  Safety invariants
\* are checked at every state up to the bound.
CONSTRAINT DebugRetryBound

PROPERTY EventuallyAllDone
