\* Micro configuration for the LL-free variant.
\*
\* Goal (per doc/proof_semantics.md §2 "終了 + CONSTRAINT なし"):
\*   - No CONSTRAINT SerialBound — finite state space must be structural.
\*   - Default CHECK_DEADLOCK TRUE — Terminating disjunct in spec absorbs
\*     the legitimate AllDone terminal state, so any *real* deadlock is
\*     caught (no `-deadlock` flag needed).
\*   - PROPERTY <>AllDone (EventuallyAllDone) — the LL-free liveness check.
\*     Under WF_vars(NextStep), priority tagging must guarantee that every
\*     execution eventually finishes. Failure here = priority gating bug.
\*
\* MaxSerial is retained as a constant so the spec module typechecks (the
\* SerialBound operator references it), but it is NOT used as a CONSTRAINT.
\* If TLC blows up on state count, that is the diagnostic — raise nothing,
\* fix the priority mechanism. Adding back CONSTRAINT SerialBound would
\* mask the real bug (proof_semantics §3).
\*
\* Usage:
\*   java -XX:+UseParallelGC -Xmx12g -cp tla2tools.jar tlc2.TLC \
\*        -workers auto \
\*        -config BundleUnbundle_2level_LLfree_micro_mc.cfg \
\*        BundleUnbundle_2level_LLfree.tla

SPECIFICATION Spec

CONSTANTS
    \* Threads must be naturals (not model values) so TagOlder's
    \* secondary key `a[2] < b[2]` typechecks. Symmetry still applies.
    Threads = {1, 2}
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxSerial = 128
    MaxCommits = 1
    BundleCollectAtomic = "fine"
    BundlePhase3Atomic  = "fine"

\* SYMMETRY removed: (1) Threads must be ordered naturals so TagOlder
\* typechecks; (2) TLC warns symmetry can miss liveness violations,
\* and EventuallyAllDone is the central property here.
\* SYMMETRY ThreadSymmetry

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleRefConsistency
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck

\* DebugSerialBound retained as a regression guard — once Transaction-scope
\* tag persistence is in place, serials should stay well under 60 even at
\* maximum contention. If a future change re-introduces a livelock, this
\* fires before the state space explodes.
INVARIANT DebugSerialBound
INVARIANT PrintTerminalSerial

\* Liveness: under WF, every execution reaches AllDone. With finite state
\* space + LL-free priority gating, this completes the formal LL-free
\* proof per proof_semantics.md §2.
PROPERTY EventuallyAllDone
