\* atomic_shared_ptr full verification: load + CAS + swap + ABA recycling
\* 2 threads, 2 objects, symmetry reduction
\* Requires ohtaka — state space ~700M+ distinct states

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Objects = {o1, o2}
    MaxOps = 3
    EnableCAS = TRUE
    EnableSwap = TRUE
    EnableRecycle = TRUE
    NULL = NULL

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
    LocalRCBounded
    QuiescentCheck
    TerminalCheck
