\* 2-thread 3L dynamic superfine: insert + CommitGrand + CommitChild concurrent.
\* Direct 3L equivalent of BundleUnbundle_2level_LLfree_dynamic_superfine_mc.cfg —
\* Grand is the only structural addition. All threads do all roles (insert, root, leaf).
\* Expected state space: 10–50× larger than 2L superfine (4.86M) due to InnerPhase.
\* ohtaka target: INVARIANT only (liveness proven by 2-thread coarse PASS).

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    Grand = Grand
    Parent = Parent
    DynChild1 = DynChild1
    DynChild2 = DynChild2
    Null = Null
    MaxCommits = 1
    UnbundleWalkAtomic  = "superfine"
    UnbundleCASAtomic   = "superfine"
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"
    Privilege = TRUE
    InsertThreads  = {1, 2}
    RootThreads    = {1, 2}
    LeafThreads    = {1, 2}
    ReleaseThreads = {}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT GrandAlwaysPriority
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound
INVARIANT PrintTerminalMaxCounter
