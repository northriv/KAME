\* Step 2: load_shared_ + compareAndSwap_ (no ABA recycling)
\* 2 threads, 2 objects
\*
\* C++ pattern tested:
\*   // Thread 1: load                    // Thread 2: CAS
\*   {                                    {
\*     local_shared_ptr<Ref> p              local_shared_ptr<Ref> newval = ...;
\*       = atomic_ptr.load_shared_();       local_shared_ptr<Ref> expected = ...;
\*     // use *p                            atomic_ptr.compareAndSwap_(expected, newval);
\*   }                                    }
\*
\* Also tests: repeated CAS by one thread while the other is mid-load or
\*   mid-CAS, exercising CASPreInc / CASTransfer / CASUndo / CASCleanup
\*   interleavings.  No object recycling — freed objects stay freed.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Objects = {o1, o2}
    EnableCAS = TRUE
    EnableSwap = FALSE
    EnableRecycle = FALSE
    NULL = NULL

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
    LocalRCBounded
