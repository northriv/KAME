\* Step 1: load_shared_/release_tag_ref_ only (no CAS, no ABA)
\* 2 threads, 2 objects, non-atomic read, max local_rc = 3, max global_rc = 6

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Objects = {o1, o2}
    MaxLocalRC = 3
    MaxGlobalRC = 6
    EnableCAS = FALSE
    EnableRecycle = FALSE
    NULL = NULL

CONSTRAINT StateConstraint

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
