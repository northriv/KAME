\* Step 1: load_shared_ / release_tag_ref_ only (no CAS, no ABA)
\* 3 threads, 2 objects
\*
\* C++ pattern tested:
\*   // Thread 1,2,3 (concurrent)
\*   {
\*     local_shared_ptr<Ref> p = atomic_ptr.load_shared_();
\*     // use *p
\*   } // ~local_shared_ptr
\*
\* Verifies: concurrent acquire_tag_ref_ + global_rc increment +
\*   release_tag_ref_ (CAS fast-path & global_rc fallback) + reset
\* No CAS → ptr never changes → no allocation/recycling needed.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2, t3}
    Objects = {o1, o2}
    EnableCAS = FALSE
    EnableSwap = FALSE
    EnableRecycle = FALSE
    NULL = NULL

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
    LocalRCBounded
