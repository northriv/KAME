\* 2-thread dynamic insert + commit + release, superfine — LIVENESS variant.
\* PROPERTY EventuallyAllDone enabled.
\*
\* State space: pending ohtaka (release coarse = 14.2M; superfine est. larger).
\* Use: sbatch ohtaka/run_l2llf_dynamic_live.sh
\*      (CFG defaults to this file)

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    Parent = Parent
    DynChild1 = DynChild1
    DynChild2 = DynChild2
    Null = Null
    MaxCommits = 1
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"
    InsertThreads  = {1, 2}
    RootThreads    = {1, 2}
    LeafThreads    = {1, 2}
    ReleaseThreads = {1, 2}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleRefConsistency
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound
INVARIANT PrintTerminalMaxCounter

PROPERTY EventuallyAllDone
