\* Liveness check: <>AllDone — eventually all threads exhaust budget and quiesce.
\* Expected to FAIL: Layer 1 has no LL-free mechanism (priority older-wins is a
\* Layer 2 concept).  Internal CAS retry loops (cas_retry ctx → cas_acquire →
\* atr_cas → ...) do not consume iterBudget, so under adversarial scheduling
\* a CAS can retry forever, violating <>AllDone.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Objects = {o1, o2}
    MaxOps = 2
    EnableCAS = TRUE
    EnableSwap = FALSE
    EnableRecycle = FALSE
    NULL = NULL

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg

PROPERTIES
    EventuallyAllDone
