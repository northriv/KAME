\* 1-thread cross-tree migration: bundle(GN1) pulls P2 from P1 into GN2.
\* Expected: bundle finalises GN1 ~missing with P2 in GN2's sub[P2].
SPECIFICATION Spec

CONSTANTS
    Threads = {1}
    GN1 = GN1
    GN2 = GN2
    P2 = P2
    P1 = P1
    Null = Null

INVARIANT SnapshotConsistency
INVARIANT HardlinkExclusive
INVARIANT BundleRefConsistency
INVARIANT DebugRetryBound

PROPERTY EventuallyAllDone
PROPERTY EventuallyConsistent
