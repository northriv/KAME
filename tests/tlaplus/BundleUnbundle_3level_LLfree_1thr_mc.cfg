\* Single-thread sanity check for 3-level LLfree.
\* No contention — should always pass; isolates base-protocol issues
\* from contention-induced bugs.

SPECIFICATION Spec

CONSTANTS
    Threads = {1}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxSerial = 128
    MaxCommits = 1
    UnbundleWalkAtomic  = "fine"
    UnbundleCASAtomic   = "fine"
    BundleCollectAtomic = "fine"
    BundlePhase3Atomic  = "fine"

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT DebugSerialBound

PROPERTY EventuallyAllDone
