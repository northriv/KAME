\* Superfine variant of the LL-free micro config.
\*
\* Same parameters as _micro_mc.cfg (Threads=2, MaxCommits=1, MaxPayload=3,
\* no CONSTRAINT SerialBound, EventuallyAllDone PROPERTY) but with
\* BundleCollectAtomic and BundlePhase3Atomic set to "superfine".
\*
\* Differences from "fine":
\*  - Phase 1 superfine prestamp CAS (parent serial bump before child
\*    collection) — already gated by CanProceed in the spec.
\*  - Phase 3 DISTURBED detection (bundle_serial / parent change check on
\*    child CAS failure) — adds a "snap_read restart" branch.
\*
\* Expected state space: ~2-5x of fine micro (2-5M distinct states)
\* based on extra branching at Phase 1 prestamp + Phase 3 DISTURBED.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxCommits = 1
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"
    RootThreads = {1, 2}
    LeafThreads = {1, 2}

\* SYMMETRY removed: see _micro_mc.cfg for rationale.

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleRefConsistency
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound
INVARIANT PrintTerminalSerial

PROPERTY EventuallyAllDone
