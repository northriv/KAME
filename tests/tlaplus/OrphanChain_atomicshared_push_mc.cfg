\* OrphanChain_atomicshared — SelfRef=TRUE + head insert enabled (MaxPush=1).
\*
\* Adds the producer/head-insert race (Push) on top of the safe-side
\* sweeper model.  Exercises Push vs HeadAdvance (both CAS `head`) and the
\* re-push of a fallen-off LIVE orphan.  Push-vs-Push and the head-cell ABA
\* are Layer 0 (atomic_shared_ptr.tla); Push is monotone in refs/forward
\* links, so it cannot of itself cause bad_release / dangling / cycle.
\* Expect CLEAN — confirms the head-insert combination preserves every
\* protocol invariant.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    N1 = n1
    N2 = n2
    N3 = n3
    NIL = nil
    SelfRef = TRUE
    AllowReown = TRUE
    MaxGen = 1
    MaxPush = 1

INVARIANTS
    TypeOK
    Inv_NoBadRelease
    Inv_LiveNeverReleased
    Inv_NoDanglingNext
    Inv_HeadAlive
    Inv_ReleasedNoIncoming
    Inv_Acyclic
