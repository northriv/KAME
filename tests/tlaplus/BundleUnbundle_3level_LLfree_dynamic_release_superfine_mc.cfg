\* 2-thread 3L dynamic superfine with release.
\* Direct 3L equivalent of BundleUnbundle_2level_LLfree_dynamic_release_superfine_mc.cfg.
\* All threads do all roles: insert + CommitGrand + CommitChild + release.
\* 2L release superfine had 413M states; 3L expected significantly larger (ohtaka).
\* ohtaka target: INVARIANT only.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    Grand = Grand
    Parent = Parent
    DynChild1 = DynChild1
    DynChild2 = DynChild2
    Null = Null
    MaxCommits = 1
    UnbundleWalkAtomic  = "superfine"
    UnbundleCASAtomic   = "superfine"
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"
    Privilege = TRUE
    InsertThreads  = {1, 2}
    RootThreads    = {1, 2}
    LeafThreads    = {1, 2}
    ReleaseThreads = {1, 2}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT GrandAlwaysPriority
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound
INVARIANT PrintTerminalMaxCounter
