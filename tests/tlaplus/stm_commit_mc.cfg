\* STM single-node commit protocol verification
\* 3 threads, values 0-3, serials 0-6

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2, t3}
    MaxVal = 3
    MaxSerial = 6

CONSTRAINT StateConstraint

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    NoLostUpdate
    CommitSerializes
    SnapshotBeforeCommit
    ValueBounded
    WriteReadConsistency
