\* 2-thread, MaxCommits=2: both threads commit twice (deeper interleaving).
\* Reproduces the historical "703-state" row AND checks liveness
\* (EventuallyAllDone), which the earlier safety-only run omitted.
SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    Parent1 = Parent1
    Parent2 = Parent2
    DynChild1 = DynChild1
    Null = Null
    MaxCommits = 2
    BundleCollectAtomic  = "superfine"
    BundlePhase3Atomic   = "superfine"
    InsertThreads  = {}
    RootThreads    = {1, 2}
    LeafThreads    = {}
    ReleaseThreads = {}

INVARIANT SnapshotConsistency
INVARIANT HardlinkExclusive
INVARIANT BundleRefConsistency
INVARIANT NoPriorityLoss
INVARIANT MissingPropagation
INVARIANT QuiescentCheck
INVARIANT TerminalPayloadCheck

PROPERTY EventuallyAllDone
