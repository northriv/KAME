\* 3-level LL-free superfine + liveness (2 threads, MaxCommits=1)
\* Direct proof of EventuallyAllDone at superfine granularity.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxCommits = 1
    UnbundleWalkAtomic  = "superfine"
    UnbundleCASAtomic   = "superfine"
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"
    Privilege = TRUE
    RootThreads = {1, 2}
    LeafThreads = {1, 2}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT GrandAlwaysPriority
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound

PROPERTY EventuallyAllDone
