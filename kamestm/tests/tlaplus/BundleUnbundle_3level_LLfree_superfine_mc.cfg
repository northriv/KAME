\* Full superfine 3-level LLfree: closest to C++ / C11 generator.
\* All 4 atomicity knobs = "superfine" → inner Phase2/3/4 split,
\* root-first cas_infos, DISTURBED detection.
\* Expected to be larger state space than _micro_mc.cfg (mixed).

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxCommits = 1
    UnbundleWalkAtomic  = "superfine"
    UnbundleCASAtomic   = "superfine"
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"
    Privilege = TRUE
    RootThreads = {1, 2}
    LeafThreads = {1, 2}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT PrintTerminalSerial
INVARIANT DebugSerialBound

PROPERTY EventuallyAllDone
