\* Phase-2 (3-level) σ-closure validation: do the candidate conjuncts hold on
\* 3-level reachable states? all-root, T=2, coarse. Separate cfg.
SPECIFICATION Spec
CONSTANTS
    Threads = {1, 2}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxCommits = 1
    Privilege = TRUE
    UnbundleWalkAtomic  = "coarse"
    UnbundleCASAtomic   = "coarse"
    BundleCollectAtomic = "coarse"
    BundlePhase3Atomic  = "coarse"
    RootThreads = {1, 2}
    LeafThreads = {1, 2}
INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT GrandAlwaysPriority
INVARIANT MissingPropagation
INVARIANT SubNeverMissing
INVARIANT BundledHasCopy
INVARIANT StaleParentExcluded
INVARIANT SubPresenceUniform
