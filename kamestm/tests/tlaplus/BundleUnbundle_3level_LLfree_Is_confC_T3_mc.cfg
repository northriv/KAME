\* 3-level σ-closure at T=3: confC (all-root) superfine + candidate structural
\* conjuncts as INVARIANTs. Safety-only (no liveness PROPERTY) — checks the
\* conjuncts hold across the full ~640M-state T=3 exhaustion, NO dump.
SPECIFICATION Spec
CONSTANTS
    Threads = {1, 2, 3}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxCommits = 1
    UnbundleWalkAtomic  = "superfine"
    UnbundleCASAtomic   = "superfine"
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"
    Privilege = TRUE
    RootThreads = {1, 2, 3}
    LeafThreads = {}
INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT GrandAlwaysPriority
INVARIANT MissingPropagation
INVARIANT SubNeverMissing
INVARIANT BundledHasCopy
INVARIANT StaleParentExcluded
INVARIANT SubPresenceUniform
