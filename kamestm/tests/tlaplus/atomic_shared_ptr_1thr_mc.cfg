\* 1-thread sanity check: no concurrency, terminal invariants must hold.
\* Verifies the spec is structurally sound (proper refcount balance at quiescence).
\* No liveness checks — only safety + terminal invariants.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1}
    Objects = {o1, o2}
    MaxOps = 3
    EnableCAS = TRUE
    EnableSwap = TRUE
    NULL = NULL

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
    LocalRCBounded
    QuiescentCheck
    TerminalCheck
    ScopeConsistent
