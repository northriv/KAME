\* NOTE: run with -deadlock flag (terminal states where all budget=0 are not bugs):
\*   java -cp tla2tools.jar tlc2.TLC -deadlock -config BundleUnbundle_mc.cfg BundleUnbundle.tla
SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxPayload = 3
    MaxSerial = 1024
    MaxCommits = 5
    \* All fine: models real C++ interleaving at every bulk-operation site
    UnbundleWalkAtomic   = "fine"
    UnbundleCASAtomic    = "fine"
    BundleCollectAtomic  = "fine"
    BundlePhase3Atomic   = "fine"

SYMMETRY ThreadSymmetry

CONSTRAINT SerialBound

INVARIANT Safety
INVARIANT TerminalPayloadCheck
