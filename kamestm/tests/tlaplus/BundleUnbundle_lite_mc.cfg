\* Lighter fine configuration (3-level): MaxCommits=2 instead of 5.
\* Sufficient for paper-quality verification: safety invariants are
\* inductive and manifest within 2 sequential commits per node.
\* State space ~100-1000x smaller than the MaxCommits=5 production cfg.
\*
\* MaxSerial = 1024: CONSTRAINT SerialBound prunes branches where any serial
\* reaches 1024. Serial arithmetic is now plain natural-number (no modular wrap),
\* matching the C++ 48-bit unsigned implementation.
\*
\* Usage:
\*   java -cp tla2tools.jar tlc2.TLC -deadlock \
\*        -config BundleUnbundle_lite_mc.cfg BundleUnbundle.tla

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxPayload = 3
    MaxSerial = 1024
    MaxCommits = 2
    \* All fine: models real C++ interleaving at every bulk-operation site
    UnbundleWalkAtomic   = "fine"
    UnbundleCASAtomic    = "fine"
    BundleCollectAtomic  = "fine"
    BundlePhase3Atomic   = "fine"

SYMMETRY ThreadSymmetry

CONSTRAINT SerialBound

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT GrandAlwaysPriority
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
