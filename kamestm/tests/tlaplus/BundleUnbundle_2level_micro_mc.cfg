\* Micro configuration for trace-completable verification.
\*
\* Goal: small enough state space that any violation produces a complete
\* trace within a B2fat (12 h, free) job, so we can actually inspect the
\* counterexample. The lite cfg (MaxCommits=2) at MaxSerial=512 hit a
\* trace-less Safety violation after 12 h on L2fat — the BFS depth (1665)
\* exhausted MaxSerial / 2, but the trace dump itself stalled on disk I/O,
\* leaving an unactionable result.
\*
\* Sizing rationale:
\*   * MaxCommits = 1   : single commit per thread keeps reachable depth low
\*                        (~50–100) so the trace replay is bounded.
\*   * MaxSerial  = 1024: CONSTRAINT SerialBound prunes branches where any
\*                        serial reaches 1024. Serial arithmetic is now plain
\*                        natural-number (no modular wrap). Previously 512
\*                        triggered NoSerialWrapAround at ~374M states under
\*                        the old modular model; that invariant is now retired.
\*   * MaxPayload = 2   : minimum to exercise non-trivial payload arithmetic.
\*
\* INVARIANT split: the original lite cfg combines three predicates into the
\* compound Safety. When TLC reports "Invariant Safety is violated" the
\* operator cannot tell which of the three actually broke. Listing each
\* component separately, plus NoSerialWrapAround, makes the failing
\* invariant identifiable by name in the slurm output — the TLC report
\* line prints the exact invariant name (SnapshotConsistency /
\* NoPriorityLoss / BundleRefConsistency / NoSerialWrapAround /
\* MissingPropagation / TerminalPayloadCheck) instead of the compound
\* Safety.
\*
\* Usage (B2fat, 12 h, free):
\*   CFG=BundleUnbundle_2level_micro_mc.cfg \
\*   TAG=l2_2lv_micro \
\*       sbatch run_b2fat_2level_fine_resume.sh

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxPayload = 2
    MaxSerial = 1024
    MaxCommits = 1
    BundleCollectAtomic = "fine"
    BundlePhase3Atomic  = "fine"

SYMMETRY ThreadSymmetry

\* Each component listed individually so the failing invariant is
\* identifiable by name in the trace report.
CONSTRAINT SerialBound

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleRefConsistency
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
