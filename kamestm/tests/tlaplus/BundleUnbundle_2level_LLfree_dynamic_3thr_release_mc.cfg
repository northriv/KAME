\* 3-thread dynamic 2L superfine, with release: insert/root/leaf separated + all release.
\* Thread 1 = InsertOnly. Thread 2 = CommitParent only. Thread 3 = CommitChild only.
\* All threads participate in release after own commits done.
\* Tests full insert+commit+release 3-way concurrency.
\* ohtaka target: INVARIANT only.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2, 3}
    Parent = Parent
    DynChild1 = DynChild1
    DynChild2 = DynChild2
    Null = Null
    MaxCommits = 1
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"
    InsertThreads  = {1}
    RootThreads    = {2}
    LeafThreads    = {3}
    ReleaseThreads = {1, 2, 3}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleRefConsistency
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound
INVARIANT PrintTerminalMaxCounter
