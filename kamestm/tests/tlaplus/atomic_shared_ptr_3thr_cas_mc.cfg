\* atomic_shared_ptr: 3-thread sanity check.
\* Light config: MaxOps = 2, EnableCAS only (no Swap) to keep state space
\* tractable on a workstation.  3-way races on (ptr, local_rc) tag CAS.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2, t3}
    Objects = {o1, o2}
    MaxOps = 2
    EnableCAS = TRUE
    EnableSwap = FALSE
    NULL = NULL

SYMMETRY AllSymmetry

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
    LocalRCBounded
    QuiescentCheck
    TerminalCheck
    ScopeConsistent
