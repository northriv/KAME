\* BundleUnbundle 3-level superfine: high-fidelity C++ failure handling
\* 2 threads, MaxCommits=1 for smoke; superfine adds:
\*   #1 Pre-bundle serial CAS (BundleCollect)
\*   #2 Inner bundle phases (BundleCollect)
\*   #4 Phase3 serial/parent check → DISTURBED
\*   #5 casTargets root-first ordering (UnbundleWalk)
\*   #6 Phase1 retry same child on parent unchanged
SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Grand = Grand
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxPayload = 3
    MaxSerial = 1024
    MaxCommits = 1
    UnbundleWalkAtomic   = "superfine"
    UnbundleCASAtomic    = "fine"
    BundleCollectAtomic  = "superfine"
    BundlePhase3Atomic   = "superfine"

SYMMETRY ThreadSymmetry

CONSTRAINT SerialBound

INVARIANT Safety
INVARIANT TerminalPayloadCheck
