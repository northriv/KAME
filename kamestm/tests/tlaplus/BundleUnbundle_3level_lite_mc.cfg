\* BundleUnbundle 3-level: "lite" exhaustive verification config.
\*
\* Sized between the local-sanity BundleUnbundle_test_mc.cfg
\* (MaxPayload=3, MaxSerial=48, all coarse) and the full production
\* BundleUnbundle_mc.cfg (MaxPayload=3, MaxSerial=1024, MaxCommits=5,
\* mixed atomicity).  "lite" keeps the production atomicity mix
\* (coarse for bulk-op sites, fine for per-step CAS) but on a tight
\* state space so a 12h cluster slot can plausibly complete or
\* checkpoint meaningfully.
\*
\* MaxSerial sizing: with natural-number serial arithmetic and CONSTRAINT
\* SerialBound, MaxSerial bounds the explored serial range. Fine-mode commit
\* retries can advance serial beyond the per-commit estimate (~64/commit), so
\* we raise to 1024 to match the 2-level/2-level-lite cfgs. CONSTRAINT
\* SerialBound prunes branches where any serial reaches MaxSerial.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Grand   = Grand
    Parent  = Parent
    Child1  = Child1
    Child2  = Child2
    Null    = Null
    MaxPayload          = 2
    MaxSerial           = 1024
    MaxCommits          = 1
    UnbundleWalkAtomic   = "coarse"
    UnbundleCASAtomic    = "fine"
    BundleCollectAtomic  = "coarse"
    BundlePhase3Atomic   = "fine"

SYMMETRY ThreadSymmetry

CONSTRAINT SerialBound

INVARIANT Safety
INVARIANT TerminalPayloadCheck
