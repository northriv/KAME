\* Lighter fine configuration: MaxCommits=2 (fits in a single 24h F2fat job).
\* MaxCommits=5 (BundleUnbundle_2level_mc.cfg) gave ~19B states; at MaxCommits=2
\* the state space is ~100-1000x smaller. All safety invariants are inductive
\* and manifest within two sequential commits per node, so MaxCommits=2 is
\* sufficient coverage for paper-quality verification of the bundle/unbundle
\* protocol at the 2-level scale.
\*
\* MaxSerial = 512: CONSTRAINT SerialBound prunes branches where any serial
\* reaches 512. Serial arithmetic is now plain natural-number (no modular wrap),
\* matching the C++ 48-bit unsigned implementation.
\*
\* Usage:
\*   java -cp tla2tools.jar tlc2.TLC -deadlock \
\*        -config BundleUnbundle_2level_lite_mc.cfg BundleUnbundle_2level.tla

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxPayload = 3
    MaxSerial = 512
    MaxCommits = 2
    BundleCollectAtomic = "fine"
    BundlePhase3Atomic  = "fine"

SYMMETRY ThreadSymmetry

CONSTRAINT SerialBound

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleRefConsistency
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
