\* 3-thread 3L dynamic superfine, Config B: insert + 2 root (no leaf thread) — LIVENESS variant.
\* Thread 1 = InsertOnly. Threads 2,3 = CommitGrand only. No LeafThreads.
\* PROPERTY EventuallyAllDone enabled.
\*
\* State space: expected large; run PHASE=1 first to assess.
\* Use: CFG=BundleUnbundle_3level_LLfree_dynamic_3thr_B_live_mc.cfg sbatch ohtaka/run_l3llf_dynamic_live.sh

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2, 3}
    Grand = Grand
    Parent = Parent
    DynChild1 = DynChild1
    DynChild2 = DynChild2
    Null = Null
    MaxCommits = 1
    UnbundleWalkAtomic  = "superfine"
    UnbundleCASAtomic   = "superfine"
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"
    Privilege = TRUE
    InsertThreads  = {1}
    RootThreads    = {2, 3}
    LeafThreads    = {}
    ReleaseThreads = {}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleChainValid
INVARIANT BundledByCorrect
INVARIANT GrandAlwaysPriority
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound
INVARIANT PrintTerminalMaxCounter

PROPERTY EventuallyAllDone
