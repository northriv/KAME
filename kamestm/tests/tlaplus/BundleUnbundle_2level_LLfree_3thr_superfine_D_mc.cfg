\* 3-thread 2L superfine, Config D: all leaf.
\* All threads = CommitChild only (no CommitParent).
\* Tests 3-way contention on child CAS + unbundle from Parent.
\* Bundle collect path exercised only as side effect of unbundle.

SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2, 3}
    Parent = Parent
    Child1 = Child1
    Child2 = Child2
    Null = Null
    MaxCommits = 1
    BundleCollectAtomic = "superfine"
    BundlePhase3Atomic  = "superfine"
    RootThreads = {}
    LeafThreads = {1, 2, 3}

INVARIANT SnapshotConsistency
INVARIANT NoPriorityLoss
INVARIANT BundleRefConsistency
INVARIANT MissingPropagation
INVARIANT TerminalPayloadCheck
INVARIANT QuiescentCheck
INVARIANT DebugSerialBound
INVARIANT PrintTerminalMaxCounter
