\* Small config for fast TLC sanity-check after spec changes.
\* MaxOps = 2 = acquire + dtor minimum for scope lifecycle.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Objects = {o1, o2}
    MaxOps = 2
    EnableCAS = TRUE
    EnableSwap = FALSE
    NULL = NULL

\* Symmetry: see atomic_shared_ptr_mc.cfg — Layer 1 has no thread ordering.
SYMMETRY AllSymmetry

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
    LocalRCBounded
    QuiescentCheck
    TerminalCheck
    ScopeConsistent
