\* 3-thread cross-tree migration: 3 threads racing on bundle(GN1)
\* pulling P2 from P1.  Each thread independently tries to migrate,
\* per-action WF guarantees every thread's progress steps fire so
\* one of them eventually wins.
SPECIFICATION Spec

CONSTANTS
    Threads = {1, 2, 3}
    GN1 = GN1
    GN2 = GN2
    P2 = P2
    P1 = P1
    Null = Null

INVARIANT SnapshotConsistency
INVARIANT HardlinkExclusive
INVARIANT BundleRefConsistency

PROPERTY EventuallyAllDone

\* No CONSTRAINT and no INVARIANT-bound tripwire (per user 2026-05-21).
\* retryCount removed from model; remaining state is bounded so TLC
\* terminates naturally.
