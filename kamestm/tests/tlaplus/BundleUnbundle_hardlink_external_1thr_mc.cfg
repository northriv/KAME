\* 1-thread minimal repro of the ORIGINAL bug: bundle(GN1) with P2
\* hardlinked external to P1.  Historically (pre-gate), GN1's
\* is_bundle_root override published GN1 ~missing while GN2.sub[P2]=Null
\* was unreachable within GN1 → SnapshotConsistency violation.  The
\* current gated spec instead stays missing on unreachability, so this
\* cfg now PASSES SnapshotConsistency (see VERIFICATION.md §5).
SPECIFICATION Spec

CONSTANTS
    Threads = {1}
    GN1 = GN1
    GN2 = GN2
    P2 = P2
    P1 = P1
    Null = Null

INVARIANT SnapshotConsistency
INVARIANT BundleRefConsistency


PROPERTY EventuallyAllDone
