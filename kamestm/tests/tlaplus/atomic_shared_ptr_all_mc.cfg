\* atomic_shared_ptr full verification: load + CAS + swap + scope
\* 2 threads, 2 objects, MaxOps = 3, symmetry reduction.
\* Baseline after Recycle action removal — re-verify all safety invariants
\* on the full op set.

SPECIFICATION Spec

CONSTANTS
    Threads = {t1, t2}
    Objects = {o1, o2}
    MaxOps = 3
    EnableCAS = TRUE
    EnableSwap = TRUE
    NULL = NULL

SYMMETRY AllSymmetry

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    MemorySafety
    NoUseAfterFree
    GlobalRCNonNeg
    FreedImpliesZeroRC
    InstalledNotFreed
    LocalRCBounded
    QuiescentCheck
    TerminalCheck
    ScopeConsistent
